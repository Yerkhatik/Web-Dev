<div class="container">
    <input type="text" placeholder="Filter by name or description" [(ngModel)]="searchText" class="search-box">
    
    <div class="grid">
      <div *ngFor="let product of filteredProducts()" class="card">
        <img [src]="product.image" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <p>⭐ {{ product.rating }}</p>
        <div class="buttons">
          <button (click)="share(product.link, 'whatsapp')">WhatsApp</button>
          <button (click)="share(product.link, 'telegram')">Telegram</button>
        </div>
        <a [href]="product.link" target="_blank" class="learn-more">Learn More »</a>
      </div>
    </div>
  </div>
